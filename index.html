---
layout: main
title: Portfolio
---

<main id="portfolio" class="portfolio">
	<button id="back-to-top" class="back-link hidden" aria-label="Back to top">
		<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none"
			stroke-linecap="round" stroke-linejoin="round">
			<path d="M18 15l-6-6-6 6" />
		</svg>
	</button>

	<section class="landing-hero" id="landing">
		{% include interactive-about.html %}
		<div class="scroll-caret-wrapper">
			<button id="scroll-to-works" class="scroll-caret" aria-label="Scroll to selected works">
				<span class="caret-text">Selected Works</span>
				<svg class="caret-icon" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor"
					stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
					<path d="M7 13l5 5 5-5M7 6l5 5 5-5" />
				</svg>
			</button>
		</div>
	</section>

	<section id="works" class="works-section">
		<div class="works-grid">
			{% for project in site.projects reversed %}
			{% if project.selected %}
			<article class="work-tile" data-id="{{ project.slug }}">
				<div class="tile-image-wrapper">
					<img src="{{ project.tile_image }}" alt="{{ project.title }}">
				</div>
				<div class="tile-info">
					<h3>{{ project.title }}</h3>
				</div>

				<template id="content-{{ project.slug }}">
					<div class="project-detail">
						<div class="project-header">
							<h3>{{ project.title }}</h3>
							<span class="project-date">{{ project.date | date: "%Y" }}</span>
						</div>
						<p class="project-subtitle">{{ project.subtitle }}</p>

						{% if project.images and project.images.size > 0 %}
						<div class="project-slideshow" data-slideshow-id="{{ project.slug }}">
							<div class="slideshow-container">
								{% for image in project.images %}
								<div class="slide fade {% if forloop.first %}active{% endif %}">
									<img src="{{ image.url }}" alt="{{ image.alt | default: project.title }}">
								</div>
								{% endfor %}

								{% if project.images.size > 1 %}
								<button class="prev-slide" aria-label="Previous Slide">&#10094;</button>
								<button class="next-slide" aria-label="Next Slide">&#10095;</button>
								<div class="slide-dots">
									{% for image in project.images %}
									<span class="dot {% if forloop.first %}active{% endif %}"
										data-index="{{ forloop.index0 }}"></span>
									{% endfor %}
								</div>
								{% endif %}
							</div>
						</div>
						{% endif %}
						<div class="project-description">
							{{ project.content | markdownify }}
						</div>
						{% if project.externallink %}
						<a href="{{ project.externallink }}" target="_blank" class="project-link">View Project
							&rarr;</a>
						{% endif %}
					</div>
				</template>
			</article>
			{% endif %}
			{% endfor %}
		</div>
	</section>

	<section class="more-section">
		<p>You're cool. Show me <a href="{{ site.baseurl }}all/">more</a>.</p>
	</section>

	<section class="social-footer">
		<ul class="footer-links">
			<li><a href="/assets/cv.pdf">CV</a></li>
			<li><a href="http://ca.linkedin.com/in/zafaraliahmed">LinkedIn</a></li>
			<li><a href="http://www.github.com/zafarali">GitHub</a></li>
		</ul>
	</section>
</main>

<div id="work-overlay" class="overlay hidden">
	<div class="overlay-card">
		<button class="close-btn">&times;</button>
		<div class="overlay-body"></div>
	</div>
</div>
